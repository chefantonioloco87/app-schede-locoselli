<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locoselli Training</title>

<link rel="icon" href="logo.PNG">
<link rel="apple-touch-icon" href="logo-apple.png">

<style>
body{font-family:Arial;margin:0;background:#0f0f0f;color:white;text-align:center}
button{width:90%;padding:15px;margin:10px;border-radius:10px;border:none;background:gold;font-weight:bold}
.section{display:none;padding:20px}
.exercise{background:#1c1c1c;margin:10px;padding:10px;border-radius:10px}
input{width:60px;margin:5px;text-align:center}
</style>
</head>

<body>

<h1>Locoselli Training</h1>

<button onclick="show('d1')">Giorno 1</button>
<button onclick="show('d2')">Giorno 2</button>
<button onclick="show('d3')">Giorno 3</button>
<button onclick="show('diet')">Dieta</button>

<div id="d1" class="section">
<h2>Push + Glutei</h2>
<div class="exercise">Hip Thrust <input id="a1"><input id="a2"></div>
<div class="exercise">Bulgarian <input id="a3"><input id="a4"></div>
<div class="exercise">Chest Press <input id="a5"><input id="a6"></div>
</div>

<div id="d2" class="section">
<h2>Pull + Glutei</h2>
<div class="exercise">Hip Thrust <input id="b1"><input id="b2"></div>
<div class="exercise">Leg Press <input id="b3"><input id="b4"></div>
<div class="exercise">Lat Machine <input id="b5"><input id="b6"></div>
</div>

<div id="d3" class="section">
<h2>Gambe + Spalle</h2>
<div class="exercise">Stacco <input id="c1"><input id="c2"></div>
<div class="exercise">Affondi <input id="c3"><input id="c4"></div>
<div class="exercise">Spalle <input id="c5"><input id="c6"></div>
</div>

<div id="diet" class="section">
<h2>Dieta</h2>
<p><b>NON mangiare di meno</b></p>
<p>Colazione: albume + avena<br>
Pranzo: pollo + riso<br>
Cena: pesce + patate</p>
</div>

<script>
function show(id){
 document.querySelectorAll('.section').forEach(s=>s.style.display='none');
 document.getElementById(id).style.display='block';
}

document.querySelectorAll("input").forEach(i=>{
 i.value=localStorage.getItem(i.id)||"";
 i.oninput=()=>localStorage.setItem(i.id,i.value);
});
</script>

</body>
</html>
